<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTO Oracle V5 | 专业决策系统</title>
    <style>
        :root { --bg: #020617; --panel: #0f172a; --accent: #00f2ff; --gold: #fbbf24; --red: #f43f5e; --green: #10b981; --border: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .app-container { display: flex; flex-direction: row; width: 100%; height: 100%; }
        @media (max-width: 900px) { body { overflow-y: auto; height: auto; } .app-container { flex-direction: column; height: auto; } .sidebar { width: 100% !important; border-right: none; height: auto; } .main-content { height: auto; overflow: visible; } }
        .sidebar { width: 400px; background: var(--panel); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--accent); text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        .card-slot { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .poker-row { display: flex; gap: 6px; min-height: 55px; align-items: center; justify-content: center; }
        .matrix { display: grid; grid-template-columns: repeat(13, 1fr); gap: 4px; margin-top: 10px; }
        @media (max-width: 600px) { .matrix { grid-template-columns: repeat(7, 1fr); } }
        .m-card { aspect-ratio: 2/3; background: #1e293b; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .m-card.active { background: var(--accent) !important; color: #000 !important; box-shadow: 0 0 12px var(--accent); }
        .red-t { color: var(--red) !important; }
        .run-btn { width: 100%; height: 55px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: radial-gradient(circle at center, #111827, #05080f); }
        .hero { background: var(--panel); border-radius: 20px; padding: 30px; display: flex; align-items: center; gap: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .equity-circle { width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; background: #1e293b; }
        .equity-circle::after { content: ""; width: 95px; height: 95px; background: var(--panel); border-radius: 50%; position: absolute; }
        .equity-num { position: relative; z-index: 5; font-size: 1.8rem; font-weight: 900; color: var(--accent); }
        .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .report-card { background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
        .card-title { color: var(--gold); font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; border-bottom: 1px solid #1e293b; padding-bottom: 8px; }
        .card-body { font-size: 0.9rem; line-height: 1.6; color: #cbd5e1; }
        .poker-c { width: 36px; height: 52px; background: #fff; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; color: #000; }
        .outs-tag { display: inline-block; background: rgba(34, 211, 238, 0.1); color: var(--accent); padding: 2px 6px; border-radius: 4px; margin: 2px; border: 1px solid rgba(34, 211, 238, 0.3); font-weight: bold;}
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo">GTO ORACLE V5</div>
        <div class="control-card">
            <div class="label">玩家人数 <b id="p-count-ui" style="color:var(--accent)">7</b></div>
            <input type="range" id="p-slider" min="2" max="9" value="7" style="width:100%">
        </div>
        <div class="control-card"><div class="label">底牌 (Hole)</div><div class="poker-row" id="hole-display"></div></div>
        <div class="control-card"><div class="label">公共牌 (Board)</div><div class="poker-row" id="board-display"></div></div>
        <div class="matrix" id="matrix"></div>
        <button id="run-btn" class="run-btn" disabled>RUN GTO ANALYSIS</button>
        <button onclick="location.reload()" style="background:none; border:none; color:#475569; margin-top:15px; cursor:pointer; font-size:12px; width:100%;">[ RESET ALL ]</button>
    </aside>

    <main class="main-content">
        <div id="welcome" style="margin: auto; text-align: center;">
            <h2 style="color: #1e293b; font-size: 2.5rem;">CORE ACTIVE</h2>
            <p style="color: #475569;">已启用位演算引擎。请选择牌局数据。</p>
        </div>
        <div id="results-view" class="hidden">
            <div class="hero">
                <div class="equity-circle" id="circle"><div class="equity-num" id="eq-text">0%</div></div>
                <div>
                    <h2 style="margin:0; color:var(--accent);">精准赢面期望 (Equity)</h2>
                    <div id="hand-name" style="font-size:1.3rem; font-weight:800; color:var(--text-gold); margin-top:5px;">--</div>
                </div>
            </div>
            <div class="result-grid">
                <div class="report-card"><div class="card-title">📊 牌力逻辑分析</div><div class="card-body" id="analysis-text"></div></div>
                <div class="report-card"><div class="card-title">🔥 致命威胁警示</div><div class="card-body" id="threat-text"></div></div>
                <div class="report-card"><div class="card-title">⚡ 推荐决策行动</div><div class="card-body" id="action-text" style="font-size:1.1rem; font-weight:bold; color:var(--accent);"></div></div>
                <div class="report-card"><div class="card-title">💎 净补牌 (Clean Outs)</div><div class="card-body" id="outs-text"></div></div>
            </div>
        </div>
    </main>
</div>

<script>
    const RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
    const SUITS = ['s','h','d','c'];
    const SUIT_ICONS = {s:'♠', h:'♥', d:'♦', c:'♣'};
    const RANK_VALS = { 'A':14,'K':13,'Q':12,'J':11,'T':10,'9':9,'8':8,'7':7,'6':6,'5':5,'4':4,'3':3,'2':2 };
    let hole = [], board = [];

    function init() {
        const matrix = document.getElementById('matrix');
        RANKS.forEach(r => SUITS.forEach(s => {
            const c = r + s;
            const div = document.createElement('div');
            div.className = `m-card ${(s==='h'||s==='d')?'red-t':''}`;
            div.innerHTML = `<span>${r}</span><span>${SUIT_ICONS[s]}</span>`;
            div.onclick = () => {
                if(hole.includes(c)) hole = hole.filter(i=>i!==c);
                else if(board.includes(c)) board = board.filter(i=>i!==c);
                else { if(hole.length < 2) hole.push(c); else if(board.length < 5) board.push(c); }
                update();
            };
            div.id = 'm-' + c;
            matrix.appendChild(div);
        }));
    }

    function update() {
        const render = (c) => `<div class="poker-c ${(c[1]==='h'||c[1]==='d')?'red-t':''}">${c[0].replace('T','10')}<br>${SUIT_ICONS[c[1]]}</div>`;
        document.getElementById('hole-display').innerHTML = hole.map(render).join('');
        document.getElementById('board-display').innerHTML = board.map(render).join('');
        document.querySelectorAll('.m-card').forEach(el => el.classList.remove('active'));
        [...hole, ...board].forEach(c => { const el = document.getElementById('m-'+c); if(el) el.classList.add('active'); });
        document.getElementById('run-btn').disabled = hole.length < 2;
    }

    function evaluate(cards) {
        let mask = 0, sMasks = {s:0, h:0, d:0, c:0}, counts = new Array(15).fill(0);
        cards.forEach(c => { mask |= (1 << c.v); sMasks[c.s] |= (1 << c.v); counts[c.v]++; });
        const getStr = (m) => {
            let ex = m; if (m & (1 << 14)) ex |= (1 << 1);
            for (let i = 14; i >= 5; i--) { if (((ex >> (i-4)) & 0x1F) === 0x1F) return i; }
            return 0;
        };
        let fSuit = Object.keys(sMasks).find(s => sMasks[s].toString(2).split('1').length - 1 >= 5);
        if (fSuit) {
            let strH = getStr(sMasks[fSuit]);
            if (strH) return { s: 8000 + strH, n: "同花顺" };
            return { s: 5000 + Math.max(...cards.filter(c=>c.s===fSuit).map(c=>c.v)), n: "同花" };
        }
        let strH = getStr(mask);
        let four=0, three=0, pairs=[];
        for(let i=14; i>=2; i--) { if(counts[i]===4) four=i; else if(counts[i]===3) three=i; else if(counts[i]===2) pairs.push(i); }
        if (four) return { s: 7000 + four, n: "四条" };
        if (three && pairs.length) return { s: 6000 + three, n: "葫芦" };
        if (strH) return { s: 4000 + strH, n: "顺子" };
        if (three) return { s: 3000 + three, n: "三条" };
        if (pairs.length >= 2) return { s: 2000 + pairs[0], n: "两对" };
        if (pairs.length === 1) return { s: 1000 + pairs[0], n: "对子" };
        return { s: Math.max(...cards.map(c=>c.v)), n: "高牌" };
    }

    document.getElementById('run-btn').onclick = () => {
        document.getElementById('welcome').classList.add('hidden');
        document.getElementById('results-view').classList.remove('hidden');
        const pCount = parseInt(document.getElementById('p-slider').value);
        const trials = 3000;
        const deck = [];
        RANKS.forEach(r => SUITS.forEach(s => deck.push({r, v: RANK_VALS[r], s})));
        const known = [...hole, ...board];
        const rem = deck.filter(c => !known.includes(c.r + c.s));
        const myCards = hole.map(c=>({v:RANK_VALS[c[0]], s:c[1]}));
        const bCards = board.map(c=>({v:RANK_VALS[c[0]], s:c[1]}));

        let wins = 0;
        for (let i = 0; i < trials; i++) {
            let sd = [...rem].sort(() => Math.random() - 0.5);
            let simB = [...bCards]; while(simB.length < 5) simB.push(sd.pop());
            let myScore = evaluate([...myCards, ...simB]).s;
            let win = true;
            for(let j=1; j<pCount; j++) { if(evaluate([sd.pop(), sd.pop()], simB).s > myScore) { win = false; break; } }
            if(win) wins++;
        }
        const eq = wins / trials;
        const curP = evaluate([...myCards, ...bCards]);
        let cleanOuts = [];
        if(board.length < 5) {
            rem.forEach(card => {
                let res = evaluate([...myCards, ...bCards, card]);
                if (res.s > curP.s + 10) cleanOuts.push(card);
            });
        }

        document.getElementById('eq-text').innerText = (eq*100).toFixed(1) + "%";
        document.getElementById('circle').style.background = `conic-gradient(var(--accent) ${eq*100}%, #1e293b 0%)`;
        document.getElementById('hand-name').innerText = curP.n;
        document.getElementById('analysis-text').innerText = `基于 ${trials} 次模拟。在 ${pCount} 人局中，当前牌力的赢面期望为 ${(eq*100).toFixed(1)}%。`;
        document.getElementById('threat-text').innerHTML = board.length >= 3 ? "顺子/同花威胁已激活。小心牌面连张。" : "暂无显著高级威胁。";
        document.getElementById('outs-text').innerHTML = cleanOuts.length ? cleanOuts.map(o => `<span class="outs-tag">${o.r}${SUIT_ICONS[o.s]}</span>`).join('') : "无有效反超补牌。";
        document.getElementById('action-text').innerText = eq > (1/pCount + 0.1) ? "推荐：价值下注" : (eq > 1/pCount ? "推荐：跟注控池" : "推荐：及时弃牌");
        if(window.innerWidth < 1000) window.scrollTo({ top: document.getElementById('results-view').offsetTop - 20, behavior: 'smooth' });
    };

    document.getElementById('p-slider').oninput = (e) => document.getElementById('p-count-ui').innerText = e.target.value;
    init(); update();
</script>
</body>
</html>
